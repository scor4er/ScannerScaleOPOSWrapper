[GENERAL]
DEBUG=1
MODE=OPOS
PIPE_NAME=ScannerScaleOPOSPipe
SCANNER_NAME=ZEBRA_SCANNER
SCALE_NAME=ZEBRA_SCALE
SCALE_ENABLED=1

;DEBUG=1 shows console output. In OPOS mode, DEBUG=0 hides the console. In EMULATOR mode, the console is always shown.
;MODE selects the runtime workflow:
;  OPOS = connect to the configured OPOS scanner/scale and forward live device events to the named pipe.
;  EMULATOR = skip OPOS hardware, start the same pipe server, and emit test events from the console.
;PIPE_NAME is the named pipe opened by client apps. Default: ScannerScaleOPOSPipe -> \\.\pipe\ScannerScaleOPOSPipe
;SCANNER_NAME is the OPOS logical name passed to OPOS.Scanner.Open(...). Used only in OPOS mode.
;SCALE_NAME is the OPOS logical name passed to OPOS.Scale.Open(...). Used only in OPOS mode.
;SCALE_ENABLED=1 enables scale initialization in OPOS mode. Set to 0 for scanner-only use.
;Named pipe payloads are line-based UTF-8 messages:
;  SCAN:<barcode>
;  WEIGHT:<formatted weight>
;Examples:
;  SCAN:012345678905
;  WEIGHT:1.250 lb.
;EMULATOR console test:
;  1. Set MODE=EMULATOR and start the wrapper from a console.
;  2. Connect a client to \\.\pipe\ScannerScaleOPOSPipe (or your PIPE_NAME value).
;  3. Type commands such as:
;     scan 123456789
;     weight 1.250
;     status
;     exit
